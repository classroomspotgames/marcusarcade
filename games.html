<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>marcus arcade</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;cursor:none!important;}
:root{
  --neon:#ffffff;
  --neon-glow:rgba(255,255,255,0.9);
  --neon-dim:rgba(255,255,255,0.4);
  --glass:rgba(10,10,20,0.75);
  --glass-border:rgba(255,255,255,0.12);
  --accent:#a78bfa;
  --accent2:#38bdf8;
  --bg:#050508;
}
html,body{min-height:100vh;background:var(--bg);overflow-x:hidden;font-family:'Share Tech Mono',monospace;}

/* ───── RAIN CANVAS ───── */
#rainCanvas{
  position:fixed;inset:0;z-index:0;pointer-events:none;
}

/* ───── CURSOR ───── */
#cursorDot{
  position:fixed;width:10px;height:10px;
  background:#fff;border-radius:50%;
  box-shadow:0 0 8px 4px rgba(255,255,255,.9),0 0 20px 8px rgba(200,200,255,.5);
  pointer-events:none;z-index:99999;
  transform:translate(-50%,-50%);
  transition:transform .05s;
}
.cursor-particle{
  position:fixed;border-radius:50%;
  pointer-events:none;z-index:99998;
  transform:translate(-50%,-50%);
}

/* ───── TOPBAR ───── */
.topbar{
  position:relative;z-index:10;
  max-width:1300px;margin:16px auto 0;padding:14px 16px;
  display:flex;gap:10px;align-items:center;
  background:var(--glass);backdrop-filter:blur(18px);
  border-radius:16px;border:1px solid var(--glass-border);
  box-shadow:0 0 30px rgba(255,255,255,.08),inset 0 1px 0 rgba(255,255,255,.06);
}
.site-title{
  font-family:'Orbitron',sans-serif;font-weight:900;font-size:15px;
  color:#fff;letter-spacing:2px;white-space:nowrap;
  text-shadow:0 0 12px rgba(255,255,255,.7);
}
#search{
  flex:1;padding:10px 14px;border-radius:10px;
  border:1px solid var(--glass-border);
  background:rgba(0,0,0,.6);color:#fff;outline:none;
  font-size:13px;font-family:'Share Tech Mono',monospace;
  transition:border-color .2s,box-shadow .2s;
}
#search:focus{border-color:rgba(255,255,255,.35);box-shadow:0 0 12px rgba(255,255,255,.1);}
#search::placeholder{color:rgba(255,255,255,.35);}
#counterBox{
  padding:10px 16px;border-radius:10px;
  border:1px solid var(--glass-border);
  background:rgba(0,0,0,.6);color:#fff;
  font-size:13px;white-space:nowrap;
  font-family:'Orbitron',sans-serif;font-weight:700;
  text-shadow:0 0 10px rgba(255,255,255,.6);
  min-width:100px;text-align:center;
}
.home-btn{
  padding:10px 16px;border-radius:10px;
  border:1px solid var(--glass-border);
  background:rgba(0,0,0,.6);color:#fff;
  text-decoration:none;font-size:13px;
  font-family:'Share Tech Mono',monospace;
  transition:all .15s;white-space:nowrap;
}
.home-btn:hover{background:rgba(255,255,255,.08);box-shadow:0 0 14px rgba(255,255,255,.15);}

/* ───── SECTIONS ───── */
.section{
  position:relative;z-index:5;
  max-width:1300px;margin:0 auto;padding:0 16px;
}
.section-header{
  display:flex;align-items:center;gap:12px;
  padding:20px 0 10px;
}
.section-label{
  font-family:'Orbitron',sans-serif;font-size:11px;
  font-weight:700;letter-spacing:3px;color:rgba(255,255,255,.5);
  text-transform:uppercase;
}
.section-line{flex:1;height:1px;background:var(--glass-border);}

/* ───── GRID ───── */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(148px,1fr));
  gap:14px;padding-bottom:24px;
}
.card{
  cursor:none!important;border-radius:14px;overflow:hidden;
  background:var(--glass);backdrop-filter:blur(14px);
  border:1px solid var(--glass-border);
  box-shadow:0 4px 20px rgba(0,0,0,.5);
  transition:transform .15s,box-shadow .15s,border-color .15s;
  position:relative;
}
.card::before{
  content:'';position:absolute;inset:0;border-radius:14px;
  background:linear-gradient(135deg,rgba(255,255,255,.04) 0%,transparent 60%);
  pointer-events:none;z-index:1;
}
.card:hover{
  transform:translateY(-5px) scale(1.03);
  border-color:rgba(255,255,255,.3);
  box-shadow:0 0 24px rgba(255,255,255,.18),0 12px 30px rgba(0,0,0,.6);
}
.thumb{
  width:100%;padding-top:100%;
  background-size:cover;background-position:center;
  background-color:#0a0a14;
  position:relative;
}
.card-title{
  background:rgba(0,0,0,.9);color:#fff;
  text-align:center;padding:9px 7px;
  font-size:11px;font-family:'Orbitron',sans-serif;font-weight:700;
  letter-spacing:.5px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  text-shadow:0 0 8px rgba(255,255,255,.5);
}
.card.hide{display:none;}

/* ───── SOURCE BADGE ───── */
.source-badge{
  position:absolute;top:6px;right:6px;z-index:2;
  font-size:8px;font-family:'Orbitron',sans-serif;font-weight:700;
  padding:2px 6px;border-radius:4px;letter-spacing:1px;
  backdrop-filter:blur(6px);
}
.badge-arc{background:rgba(167,139,250,.25);color:#a78bfa;border:1px solid rgba(167,139,250,.4);}
.badge-gn{background:rgba(56,189,248,.25);color:#38bdf8;border:1px solid rgba(56,189,248,.4);}

/* ───── LOADING ───── */
#gnLoader{
  text-align:center;padding:40px;
  font-family:'Orbitron',sans-serif;font-size:12px;
  letter-spacing:3px;color:rgba(255,255,255,.4);
  animation:pulse 1.5s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:.4;}50%{opacity:1;}}

/* ───── FOOTER ───── */
footer{
  position:relative;z-index:5;
  text-align:center;padding:24px;
  font-family:'Orbitron',sans-serif;font-size:10px;
  letter-spacing:2px;color:rgba(255,255,255,.2);
}
</style>

/* ════════════════════════════════
   RAIN CANVAS
════════════════════════════════ */
(function(){
  const canvas=document.getElementById('rainCanvas');
  const ctx=canvas.getContext('2d');
  let drops=[];
  function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
  resize();window.addEventListener('resize',resize);
  function initDrops(){
    drops=[];
    const count=Math.floor(window.innerWidth/9);
    for(let i=0;i<count;i++){
      drops.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        len:Math.random()*80+30,
        speed:Math.random()*4+2,
        opacity:Math.random()*.18+.04,
        width:Math.random()*.8+.3,
      });
    }
  }
  initDrops();
  window.addEventListener('resize',initDrops);
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    drops.forEach(d=>{
      const grad=ctx.createLinearGradient(d.x,d.y,d.x,d.y+d.len);
      grad.addColorStop(0,'rgba(180,200,255,0)');
      grad.addColorStop(.5,`rgba(200,220,255,${d.opacity})`);
      grad.addColorStop(1,'rgba(180,200,255,0)');
      ctx.strokeStyle=grad;
      ctx.lineWidth=d.width;
      ctx.beginPath();ctx.moveTo(d.x,d.y);ctx.lineTo(d.x-d.len*.08,d.y+d.len);ctx.stroke();
      d.y+=d.speed;
      if(d.y>canvas.height+d.len){d.y=-d.len;d.x=Math.random()*canvas.width;}
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

/* ════════════════════════════════
   CUSTOM CURSOR + PARTICLE TRAIL
════════════════════════════════ */
(function(){
  const dot=document.getElementById('cursorDot');
  let mx=0,my=0;
  const particles=[];
  document.addEventListener('mousemove',e=>{
    mx=e.clientX;my=e.clientY;
    dot.style.left=mx+'px';dot.style.top=my+'px';
    spawnParticles(mx,my);
  });
  function spawnParticles(x,y){
    const count=3;
    for(let i=0;i<count;i++){
      const p=document.createElement('div');
      p.className='cursor-particle';
      const size=Math.random()*5+2;
      const hue=Math.random()<.5?'255,255,255':'200,200,255';
      p.style.cssText=`
        width:${size}px;height:${size}px;
        left:${x}px;top:${y}px;
        background:rgba(${hue},${Math.random()*.6+.3});
        box-shadow:0 0 ${size*2}px rgba(255,255,255,.5);
      `;
      document.body.appendChild(p);
      const vx=(Math.random()-.5)*3;
      const vy=(Math.random()-.5)*3-1;
      let life=1;
      const id=setInterval(()=>{
        life-=.06;
        if(life<=0){clearInterval(id);p.remove();return;}
        const cx=parseFloat(p.style.left)+vx;
        const cy=parseFloat(p.style.top)+vy+1;
        p.style.left=cx+'px';p.style.top=cy+'px';
        p.style.opacity=life;
        p.style.transform=`translate(-50%,-50%) scale(${life})`;
      },16);
    }
  }
})();

function getGameHTML(key){
  const b64=GAME_HTML_B64[key];if(!b64)return null;
  return decodeURIComponent(atob(b64).split('').map(c=>'%'+('00'+c.charCodeAt(0).toString(16)).slice(-2)).join(''));
}
async function openGame(card,url){
  const name=card.querySelector('.card-title')?.textContent.trim()||'Game';
  const win=window.open('about:blank','_blank');if(!win)return;
  win.document.open();win.document.write(`<title>${name}</title><body style="margin:0;background:#000;color:#fff;display:flex;align-items:center;justify-content:center;font-family:monospace;font-size:18px">Loading ${name}...</body>`);win.document.close();
  try{const r=await fetch(url);const h=await r.text();win.document.open();win.document.write(h);win.document.close();win.document.title=name;}
  catch(e){win.document.open();win.document.write(`<h2 style='color:#fff;font-family:monospace'>Failed to load ${name}</h2>`);win.document.close();}
}
function openInline(card,key){
  const name=card.querySelector('.card-title')?.textContent.trim()||'Game';
  const html=getGameHTML(key);if(!html)return;
  const win=window.open('about:blank','_blank');if(!win)return;
  win.document.open();win.document.write(html);win.document.close();win.document.title=name;
}

/* ════════════════════════════════
   RENDER + SEARCH + COUNTER
════════════════════════════════ */
const arcadeGrid=document.getElementById('grid');
const gnGrid=document.getElementById('gnGrid');
const search=document.getElementById('search');
const counterBox=document.getElementById('counterBox');
let allCards=[];

function makeCard(title,thumb,onclick,badge='arc'){
  const d=document.createElement('div');
  d.className='card';
  d.dataset.title=title.toLowerCase();
  d.onclick=onclick;
  d.innerHTML=`
    <div class="thumb" style="background-image:url('${thumb}')"></div>
    <span class="source-badge badge-${badge}">${badge==='arc'?'ARC':'GN'}</span>
    <div class="card-title">${title}</div>`;
  return d;
}

// Render Marcus games
MARCUS_GAMES.forEach(g=>{
  const onclick=g.action
    ? new Function(g.action.replace('this','this._card'))
    : function(){openGame(this,g.url);};
  const card=makeCard(g.title,g.thumb,null,'arc');
  if(g.action){
    card.setAttribute('onclick',g.action);
  } else {
    card.onclick=function(){openGame(this,g.url);};
  }
  arcadeGrid.appendChild(card);
  allCards.push(card);
});

// Fetch GN Math zones
const coverURL="https://cdn.jsdelivr.net/gh/gn-math/covers@main";
const htmlURL="https://cdn.jsdelivr.net/gh/gn-math/html@main";
const arcadeTitlesLower=new Set(MARCUS_GAMES.map(g=>g.title.toLowerCase().trim()));

fetch("https://cdn.jsdelivr.net/gh/gn-math/assets@main/zones.json?t="+Date.now())
  .then(r=>r.json())
  .then(zones=>{
    document.getElementById('gnLoader').style.display='none';
    let added=0;
    zones.forEach(z=>{
      const t=z.name.toLowerCase().trim();
      if(arcadeTitlesLower.has(t))return; // skip duplicates
      const cover=(z.cover||'').replace('{COVER_URL}',coverURL).replace('{HTML_URL}',htmlURL);
      const url=(z.url||'').replace('{COVER_URL}',coverURL).replace('{HTML_URL}',htmlURL);
      const card=makeCard(z.name,cover,null,'gn');
      if(url.startsWith('http')&&!url.includes('cdn.jsdelivr')){
        card.onclick=()=>window.open(url,'_blank');
      } else {
        card.onclick=function(){
          const name=z.name;const win=window.open('about:blank','_blank');if(!win)return;
          win.document.open();win.document.write(`<title>${name}</title><body style="margin:0;background:#000;color:#fff;display:flex;align-items:center;justify-content:center;font-family:monospace;font-size:18px">Loading ${name}...</body>`);win.document.close();
          fetch(url+'?t='+Date.now()).then(r=>r.text()).then(h=>{win.document.open();win.document.write(h);win.document.close();win.document.title=name;}).catch(()=>{});
        };
      }
      gnGrid.appendChild(card);
      allCards.push(card);
      added++;
    });
    updateCounter();
  })
  .catch(()=>{document.getElementById('gnLoader').textContent='Failed to load GN zones.';});

function updateCounter(){
  const vis=allCards.filter(c=>!c.classList.contains('hide')).length;
  counterBox.textContent=vis+' GAME'+(vis===1?'':'S');
}
updateCounter();

search.addEventListener('input',()=>{
  const v=search.value.toLowerCase().trim();
  allCards.forEach(c=>{c.classList.toggle('hide',!c.dataset.title.includes(v));});
  updateCounter();
});
</script>
